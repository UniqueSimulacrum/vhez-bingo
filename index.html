<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vhezly's Horror Bingo</title>
  <link rel="stylesheet" href="css/colors.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/slider.css">
  <link rel="stylesheet" href="css/fireworks.css">
  <link rel="stylesheet" href="fontawesome/css/fontawesome.min.css">
  <link rel="stylesheet" href="fontawesome/css/brands.min.css">
  <link rel="stylesheet" href="fontawesome/css/solid.min.css">
  <link rel="stylesheet" href="fontawesome/css/regular.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Saira+Extra+Condensed:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<div id="restartModal" class="modal">
  <div class="modal-content">
    <h2>Neustart</h2>
    <p>Möchtest du das Spielfeld leeren oder die Zahlen behalten?</p>
    <div class="modal-buttons">
      <button id="keepBtn">Zahlen behalten</button>
      <button id="clearBtn">Alles leeren</button>
      <button id="cancelBtn">Abbrechen</button>
    </div>
  </div>
</div>
<body>
  <div class="app">
    <div class="card">
      <h1 id="title" class="title"></h1>
      <div id="grid" class="grid" aria-label="5x5 Bingo Feld"></div>
      <div class="controls">
        <div class="buttons">
          <button id="copyBtn" class="icon-btn" type="button" disabled title="Kopiere Spielfeld">
             <i class="fa-regular fa-copy"></i>
          </button>
          <button id="startBtn" class="icon-btn" type="button" disabled title="Start">
            <i class="fa-solid fa-play play-icon"></i>
            <i class="fa-solid fa-rotate-right restart-icon"></i>
          </button>
          <button id="fillBtn" class="icon-btn" type="button" title="Zufällig befüllen">
            <i class="fa-solid fa-random"></i>
          </button>
          <label class="toggle" id="lock">
            <div class="switch">
              <input id="lockToggle" type="checkbox" disabled title="Sperre aktivieren">
              <span class="slider">
                <i class="fa-solid fa-lock lock-icon"></i>
                <i class="fa-solid fa-lock-open unlock-icon"></i>
              </span>
            </div>
          </label>
        </div>
        <div id="status" class="hint"></div>
      </div>
    </div>
  </div>
  <div class="firework"></div>
  <div id="toast"></div>
</body>
  <div id="easteregg" class="easteregg">
    <img src="img/dance.gif" alt="dance" class="dance-gif" />
    <audio id="secret-audio" src="img/secret.mp3"></audio>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="js/copyToclipboard.js"></script>
  <script src="js/script.js"></script>
  <script src="js/modal.js"></script>
</html>
